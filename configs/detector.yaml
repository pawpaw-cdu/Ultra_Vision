detector:
  enemy_color: 0
  binary_threshold: 160
  light:
    min_ratio: 0.15
    max_ratio: 0.55
    max_angle: 40.0
    min_contour_points: 8
  armor:
    height_ratio_min: 0.75
    height_ratio_max: 1.25
    angle_diff_max: 40.0
    width_to_height_min: 0.8
    width_to_height_max: 2.0
    large_armor_ratio_thresh: 3.0
  color:
    use_color_detect: true
    # 选择颜色空间: "hsv" 或 "bgr"
    method: "hsv"
    # HSV 阈值（当 method = "hsv" 时使用）
    hsv:
      red_low1: 0
      red_high1: 35
      red_low2: 135
      red_high2: 180
      blue_low: 90
      blue_high: 135
      sat_min: 80
      val_min: 80
      area_ratio: 0.3          # 目标颜色像素占比超过此值认为有效
    # BGR 阈值（当 method = "bgr" 时使用）
    bgr:
      red_threshold: 1.0
      blue_threshold: 1.0